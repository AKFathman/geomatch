name: ETL Nightly

on:
  schedule:
    # 06:00 UTC = 02:00 ET — runs after most overnight data refreshes
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      skip:
        description: "Space-separated source names to skip (e.g. 'laus zillow' for a quick smoke test)"
        required: false
        default: ""
  push:
    paths:
      - "etl/**"
      - ".github/workflows/etl.yml"

permissions:
  contents: write  # needed to commit refreshed parquet back to main

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Run ETL
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          FBI_API_KEY: ${{ secrets.FBI_API_KEY }}
        run: |
          if [ -n "${{ inputs.skip }}" ]; then
            python pipeline.py --verbose --skip ${{ inputs.skip }}
          else
            python pipeline.py --verbose
          fi

      - name: Upload artifact (manual inspection)
        uses: actions/upload-artifact@v4
        with:
          name: feature-matrix
          path: etl/output/
          retention-days: 14

      - name: Copy outputs into web/public/data
        # working-directory is etl/ (job default), so output/ paths are relative to that
        run: |
          mkdir -p ../web/public/data
          cp output/feature_matrix.parquet ../web/public/data/
          cp output/manifest.json ../web/public/data/
          ls -la ../web/public/data/

      - name: Commit refreshed data
        # Only run on schedule/dispatch — skip on push to avoid commit loops
        if: github.event_name != 'push'
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "geomatch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add web/public/data/feature_matrix.parquet web/public/data/manifest.json
          if git diff --cached --quiet; then
            echo "no data changes"
          else
            git commit -m "data: nightly refresh $(date -u +%Y-%m-%d)"
            git push
          fi
          # Pushing main triggers Vercel deploy automatically.
